general.import = [ "~/.local/share/dotfiles/current/theme/alacritty.toml" ]

[env]
TERM = "xterm-256color"

[terminal]
osc52 = "CopyPaste"

[font]
normal = { family = "CaskaydiaMono Nerd Font", style = "Regular" }
bold = { family = "CaskaydiaMono Nerd Font", style = "Bold" }
italic = { family = "CaskaydiaMono Nerd Font", style = "Italic" }
size = 12

[window]
padding.x = 8
padding.y = 10
decorations = "None"
opacity = 0.85     
blur = true        


[keyboard]
bindings = [
    { key = "F11", action = "ToggleFullscreen" },
    { key = "Enter", mods = "Shift", chars = "\u001B\r" }
]
