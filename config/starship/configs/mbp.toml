# Increase timeout to prevent lag in large Git repositories
command_timeout = 5000

# Prompt format: Line 1 for info, Line 2 for input
format = """
$username$hostname$directory$git_branch$git_status$conda$python$rlang$docker_context$cmd_duration$time
[ ╰─ ](bold green)$os$character"""

## --- Info & Status ---
[username]
format = " [╭╴](bold green)[$user](purple) "
style_user = "bold white"
style_root = "bold red"
show_always = true

[hostname]
disabled = true 

[directory]
style = "bold cyan" 
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

## --- Git ---
[git_branch]
symbol = " "
style = "bold dimmed-white" 
format = "on [$symbol$branch]($style) "

[git_status]
format = '[\($all_status$ahead_behind\)](bold green) '
conflicted = "󰞇 "
up_to_date = " "
untracked = " "
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
stashed = "󰏗 "
modified = " "
staged = '+$count'
renamed = "󰖷 "
deleted = " "

## --- Command Duration & Time ---
[cmd_duration]
min_time = 1000 
format = "took [$duration](dimmed white) "
disabled = false

[time]
disabled = false
format = "at [$time]($style) "
style = "dimmed white"
time_format = "%H:%M"

## --- Languages & Tools ---
[conda]
symbol = " "
format = "[$symbol$environment](dimmed white) "
ignore_base = false

[python]
symbol = " "
format = "via [$symbol$virtualenv]($style) "
style = "dimmed white"

## --- OS Detection ---
[os]
disabled = false
format = "[$symbol ](bold white)"

[os.symbols]
Windows = "[](bold purple)"   
Arch = "[](bold purple)"
Macos = "[](bold purple)"     

## --- Prompt Character ---
[character]
success_symbol = "(bold green)"
error_symbol = "(bold red)"  

[status]
symbol = "✘"
format = '[\[$symbol $exit_code\]]($style) '
style = "bold red"
disabled = false
