# Increase timeout to prevent lag in large Git repositories
command_timeout = 5000

# Prompt format: Line 1 for info, Line 2 for input
format = """
$username$hostname$directory$git_branch$git_status$conda$python$rlang$docker_context$time
[ ╰─ ](bold green)$os$character"""

## --- Info & Status ---
[username]
format = " [╭╴](bold green)[$user]($style) in "
style_user = "bold green"
style_root = "bold red"
show_always = true

[hostname]
format = "[$hostname]($style) in "
style = "bold red"
trim_at = "-"
ssh_only = false
disabled = true # Keep true for single-machine use

[directory]
style = "bold green"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

## --- Git ---
[git_branch]
symbol = " "
style = "green italic bold"
format = "on [$symbol$branch]($style) "

[git_status]
format = '[\($all_status$ahead_behind\)](bold italic green) '
conflicted = "󰞇 "
up_to_date = " "
untracked = " "
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
stashed = "󰏗 "
modified = " "
staged = '[+$count](green)'
renamed = "󰖷 "
deleted = " "

## --- Command Duration & Time ---
[cmd_duration]
min_time = 1000 # Show only if execution takes > 1s
format = "took [$duration](bold yellow) "
disabled = false

[time]
disabled = false
format = "at [$time]($style) "
style = "dimmed green"
time_format = "%H:%M"

## --- Languages & Tools ---
[conda]
symbol = " "
format = "[$symbol$environment](green) "
ignore_base = false

[python]
symbol = " "
format = "via [$symbol$virtualenv]($style) "
style = "bold green"

[rlang]
symbol = " "
format = "via [$symbol$version]($style) "

[docker_context]
symbol = "🐳 "
format = "via [$symbol$context]($style) "
style = "green italic bold"

## --- OS Detection ---
[os]
disabled = false
format = "[$symbol ](bold green)"

[os.symbols]
Windows = ""   
Arch = ""      
Macos = ""     

## --- Prompt Character ---
[character]
# Success: Green arrow
success_symbol = "(bold green)"
# Error: Red arrow on command failure
error_symbol = "(bold red)"  

[status]
symbol = "✘"
format = '[\[$symbol $exit_code\]]($style) '
style = "bold red"
disabled = false
